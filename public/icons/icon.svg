<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#047857"/>
      <stop offset="1" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5d57a"/>
      <stop offset="1" stop-color="#d4af37"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Islamic geometric star pattern -->
  <g stroke="url(#gold)" stroke-width="2.5" fill="none" opacity="0.18">
    <polygon points="256,72 392,184 392,328 256,440 120,328 120,184"/>
    <polygon points="256,120 360,200 360,312 256,392 152,312 152,200"/>
  </g>
  <!-- Open book -->
  <g>
    <path d="M128 192 L256 224 L384 192 L384 352 L256 384 L128 352 Z"
          fill="#faf8f1" opacity="0.96"/>
    <path d="M256 224 L256 384" stroke="#065f46" stroke-width="3"/>
    <path d="M152 212 L256 240 L256 360 L152 332 Z" fill="#f5efe0"/>
    <path d="M360 212 L256 240 L256 360 L360 332 Z" fill="#f5efe0"/>
    <!-- Arabic-inspired lines on pages -->
    <g stroke="#a07e2a" stroke-width="1.4" opacity="0.65">
      <line x1="170" y1="240" x2="240" y2="254"/>
      <line x1="170" y1="256" x2="240" y2="270"/>
      <line x1="170" y1="272" x2="240" y2="286"/>
      <line x1="170" y1="288" x2="240" y2="302"/>
      <line x1="170" y1="304" x2="240" y2="318"/>
      <line x1="272" y1="254" x2="342" y2="240"/>
      <line x1="272" y1="270" x2="342" y2="256"/>
      <line x1="272" y1="286" x2="342" y2="272"/>
      <line x1="272" y1="302" x2="342" y2="288"/>
      <line x1="272" y1="318" x2="342" y2="304"/>
    </g>
  </g>
  <!-- Crescent moon accent -->
  <g transform="translate(384 128)">
    <circle r="28" fill="url(#gold)"/>
    <circle r="22" cx="9" cy="-2" fill="#065f46"/>
  </g>
